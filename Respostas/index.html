<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respostas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script src="script.js"></script>

    <h1>Respostas de indicações</h1>
    <p>Respostas das indicações feitas pelos vereadores à Prefeitura.</br>
    Selecione o autor e o ano da indicação para visualizar as respostas.</p>

    <div id="pesquisa-autor">
        <label for="autor">Autor:</label>
        <select id="selecao-autor">
            <option value="">Selecione o autor</option>
        </select>
    </div>

    <div id="pesquisa-ano">
        <label for="ano">Ano:</label>
        <select id="selecao-ano">
            <option value="">Selecione o ano</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
        </select>
    </div>

    <div class="acoes-pesquisa">
        <button type="button" id="btn-limpar" class="botao-limpar">Limpar</button>
        <button type="button" id="btn-pesquisar" class="botao-pesquisar">Pesquisar</button>

    </div>

    <div id="lista-sessoes">
        <!-- As sessões serão carregadas aqui dinamicamente -->
    </div>  

     <div id="controles-paginacao" style="display: none; align-items: center; gap: 15px; margin-top: 20px; margin-bottom: 30px;">
            <button type="button" id="btn-anterior" class="botao-pesquisar-atas" disabled="disabled">« Anterior</button>
            <span id="info-pagina" style="font-weight: bold; color: #555;">Página 1</span>
            <button type="button" id="btn-proximo" class="botao-pesquisar-atas" disabled="disabled">Próxima »</button>
        </div>
</body>
</html>
