<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="pt" lang="pt"
      metal:use-macro="here/main_template/macros/master">
<body>
    
    <metal:main fill-slot="main">

        <script type="module" tal:attributes="src string:${portal_url}/++theme++cmtapira/javascript/buscaratas.js"></script> 
        
        <h1 class="documentFirstHeading">Atas das Reuniões</h1>
        <p class="descricao">Contém as atas das reuniões desde 2023.<br>
        As atas das reuniões são votadas e disponibilizadas na semana seguinte à reunião.<br>  
        Selecione o ano desejado e clique em pesquisar para poder baixar as atas.</p>

        <div class="pesquisa-atas" style="margin-bottom: 20px;">
            <label for="ano-ata"><strong>Ano:</strong></label>
            <select id="ano-ata" class="caixa-selecao">
                <option value="">Selecione</option>
            </select>
            <button type="button" id="btn-pesquisar" class="botao-pesquisar">Pesquisar</button>
        </div>

        <div id="lista-sessoes"></div>

        <div id="controles-paginacao" style="display: none; align-items: center; gap: 15px; margin-top: 20px; margin-bottom: 30px;">
            <button type="button" id="btn-anterior" class="botao-pesquisar-atas" disabled="disabled">« Anterior</button>
            <span id="info-pagina" style="font-weight: bold; color: #555;">Página 1</span>
            <button type="button" id="btn-proximo" class="botao-pesquisar-atas" disabled="disabled">Próxima »</button>
        </div>

    </metal:main>
</body>
</html>
